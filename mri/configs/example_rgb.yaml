# Example MRI config — equivalent to passing --pos/--neg on the CLI, but lets
# you pin per-dataset imgsz / rule / caps. Run with:
#   python -m mri --yolo "RGB model/Yolo26n_selcom_confuser_ft4_1280/weights/best.pt" --config mri/configs/example_rgb.yaml --train-mlp
#
# `rule: iop` + `imgsz: 1280` are auto-applied for paths containing svan/selcom,
# but you can set them explicitly here for any dataset.

pos:
  - path: G:/drone/svanstrom_paired/RGB/images
    imgsz: 1280
    rule: iop
    max: 4000
  - path: G:/drone/Anti-UAV-RGBT_yolo_converted/test/RGB/images
    stride: 3
    max: 3000

neg:
  - path: G:/drone/rgb_confusers_merged/images/test
    max: 4000
