# ══════════════════════════════════════════════════════════════
# Fusion Classifier Configuration
# ══════════════════════════════════════════════════════════════

# ── Model weights ──
rgb_weights: "../models/rgb/Yolo26n_trained/weights/best.pt"
ir_weights: "../models/ir/corrective_finetune/finetune_v3b/weights/best.pt"

# ── Paired evaluation dataset (Anti-UAV-RGBT) ──
dataset_root: "G:/drone/Anti-UAV-RGBT_yolo_converted/test"
rgb_subdir: "RGB"          # {dataset_root}/{rgb_subdir}/images, /labels
ir_subdir: "IR"            # {dataset_root}/{ir_subdir}/images, /labels
rgb_stem_suffix: "_visible"
ir_stem_suffix: "_infrared"

# ── YOLO inference ──
imgsz: 640
device: "0"
conf: 0.001                # very low — classifier decides acceptance, not YOLO threshold
iou_nms: 0.7               # NMS IoU for YOLO inference
max_det: 300

# ── Detection alignment (cross-modality matching) ──
alignment_iou: 0.3         # lower than eval's 0.5 — different sensors have registration offset

# ── GT matching ──
matching_iou: 0.5          # IoU threshold for labeling candidates as TP vs FP

# ── Features ──
# Core features (always enabled):
#   conf_max, conf_min, agreement, bbox_area_norm
#
# Extended features (toggle below):
use_conf_delta: true           # |conf_rgb - conf_ir| — measures modality disagreement
use_aspect_ratio: true         # w/h of detection box — drones have characteristic shapes
use_n_dets_total: true         # total detections in frame — scene clutter indicator
#
# Environmental features:
use_time_features: true        # hour + time_of_day (day/dusk_dawn/night) from sequence name
#
# Thermal features:
use_ir_contrast: true          # ir_contrast_ratio + ir_local_contrast
use_brightness: true           # rgb_brightness + ir_brightness (frame-level only)
                               # Measures drone-to-background thermal contrast in IR image
                               # Low contrast ≈ thermal crossover → IR struggles, trust RGB
                               # NOTE: requires IR images accessible via dataset_root

# ── Classifier ──
classifier_type: "xgboost"   # xgboost | logistic_regression
xgboost:
  n_estimators: 200
  max_depth: 4
  learning_rate: 0.1
  min_child_weight: 10
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: "aucpr"

# ── Output ──
output_dir: "runs"
